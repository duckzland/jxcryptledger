name: Desktop Build & Release

on:
  push:
    tags:
      - "v*" # Triggers on tags like v1.0.0

jobs:
  # Windows build disabled for now as it isn't installable without proper certificates.
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Create .env file
        shell: bash
        run: echo "${{ secrets.ENV_FILE_CONTENT }}" > .env

      - name: Install Dependencies
        run: flutter pub get

      # Locks SDK, rc.exe problematic with image
      - name: Set up Visual Studio Developer Paths (Forced SDK 10.0.26100.0)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          sdk: '10.0.26100.0'

      - name: Build Windows MSI
        shell: cmd
        run: |
          call build-msi.bat

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: build/*.msi

      - name: Cleanup
        if: always()
        run: |
          if (Test-Path .env) { Remove-Item .env -Force }
          if (Test-Path build) { Remove-Item build -Recurse -Force }
          if (Test-Path libs) { Remove-Item libs -Recurse -Force }

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Install Linux Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE_CONTENT }}" > .env

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Linux bundle and create DEB package
        run: |
          chmod +x ./build-debian.sh
          ./build-debian.sh --no-commit

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: "build/*.deb"

      - name: Cleanup
        if: always()
        run: rm -f .env
          rm -rf build/
          rm -rf libs/

  create-release:
    # Windows build is disabled for now
    needs: [build-windows, build-linux]
    # needs: [build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            # windows-msi/*.msi
            linux-deb/*.deb
          body: "Automated Build for ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
