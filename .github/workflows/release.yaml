name: Desktop Build & Release

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.0

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install png2ico
        run: choco install png2ico --yes

      - name: Regenerate app_icon.ico
        run: png2ico windows/runner/resources/app_icon.ico icon_16.png icon_32.png icon_48.png icon_256.png

      - name: Create .env file
        shell: bash
        run: echo "${{ secrets.ENV_FILE_CONTENT }}" > .env

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows MSI
        shell: cmd
        run: |
          call build-windows-msi.bat

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: build/*.msi

      - name: Cleanup
        if: always()
        shell: bash
        run: rm -f .env

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Linux Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE_CONTENT }}" > .env
          
      - name: Install Dependencies
        run: flutter pub get

      - name: Build Linux bundle and create DEB package
        run: |
          chmod +x ./build-debian.sh
          ./build-debian.sh --no-commit

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: "build/*.deb"

      - name: Cleanup
        if: always()
        run: |
          rm -f .env
          rm -rf build/
          rm -rf libs/

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            windows-msi/*.msi
            linux-deb/*.deb
          body: "Automated Build for ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
