name: jxledger
description: "JXLedger Transaction Manager."
publish_to: "none"
version: 1.0.27

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Using git dependency to apply a crude fix for failed insert at root index 0. Should be removed once the fix is released.
  animated_tree_view:
    git:
      url: https://github.com/duckzland/animated_tree_view.git
      ref: fix_failed_insert_root_index_0

  cupertino_icons: ^1.0.8
  go_router: ^17.1.0
  cryptography: ^2.9.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  path_provider: ^2.1.5
  get_it: ^9.2.0
  flutter_dotenv: ^6.0.0
  pinyin: ^3.3.0
  http: ^1.6.0
  decimal: ^3.2.4
  intl: ^0.20.2
  flutter_typeahead: ^6.0.0
  uuid: ^4.0.0
  data_table_2: ^2.7.2
  # animated_tree_view: ^2.3.0
  qr_flutter: ^4.1.0
  file_selector: ^1.1.0
  flutter_local_notifications: ^21.0.0
  flutter_local_notifications_windows: ^3.0.0
  path: ^1.9.1
  reorderable_grid_view: ^2.2.8

dev_dependencies:
  dotenv: ^4.2.0
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.16.13
  test: ^1.29.0

flutter:
  assets:
    - assets/icon.png
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Thin.ttf
          weight: 100
        - asset: assets/fonts/Inter-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Inter-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Inter-Black.ttf
          weight: 900

flutter_launcher_icons:
  image_path: "assets/icon.png"
  windows:
    generate: true
    icon_size: 256
  linux:
    generate: true
    icon_name: "jxledger"

msix_config:
  display_name: JXLedger
  publisher_display_name: Jason Xie
  identity_name: com.duckzland.jxledger
  msix_version: 1.0.0.0
  logo_path: assets/icon.png
  install_certificate: true
